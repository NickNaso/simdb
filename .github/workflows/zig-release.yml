name: Cross-Compile Zig Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_release:
    name: Build and Zip Artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────────────────
          - target: x86_64-windows-gnu      # Windows x64 (GNU ABI)
            os_name: win-x64
          # x86_64-windows-msvc is intentionally omitted: Zig cannot provide
          # libc for MSVC ABI when cross-compiling from Linux. Build natively
          # on Windows if an MSVC-compatible binary is required.
          - target: aarch64-windows-gnu     # Windows ARM64
            os_name: win-arm64
          - target: x86-windows-gnu         # Windows 32-bit
            os_name: win-x86

          # ── Linux x86 ────────────────────────────────────────────────────────
          - target: x86_64-linux-gnu        # Linux x64
            os_name: linux-x64
          - target: x86-linux-gnu           # Linux 32-bit
            os_name: linux-x86

          # ── Linux ARM ────────────────────────────────────────────────────────
          - target: aarch64-linux-gnu       # Linux ARM64
            os_name: linux-arm64
          - target: arm-linux-gnueabihf     # Linux ARMv7 (Raspberry Pi, embedded)
            os_name: linux-arm32

          # ── Linux Other ──────────────────────────────────────────────────────
          - target: riscv64-linux-gnu       # Linux RISC-V 64-bit
            os_name: linux-riscv64
          - target: powerpc64le-linux-gnu   # Linux PowerPC 64-bit LE (IBM Power)
            os_name: linux-ppc64le
          - target: mips-linux-gnueabi      # Linux MIPS 32-bit (soft-float EABI)
            os_name: linux-mips
          - target: mips64-linux-gnuabi64   # Linux MIPS 64-bit (n64 ABI)
            os_name: linux-mips64

          # ── macOS ────────────────────────────────────────────────────────────
          - target: aarch64-macos-none      # macOS Apple Silicon
            os_name: macos-arm64
          - target: x86_64-macos-none       # macOS Intel
            os_name: macos-x64

          # ── BSD ──────────────────────────────────────────────────────────────
          - target: x86_64-freebsd-none     # FreeBSD x64
            os_name: freebsd-x64
          - target: aarch64-freebsd-none    # FreeBSD ARM64
            os_name: freebsd-arm64
          - target: x86_64-netbsd-none      # NetBSD x64
            os_name: netbsd-x64

          # wasm32-wasi is intentionally omitted: SimDB relies on OS-level
          # shared memory (mmap), file descriptors, and POSIX directory APIs
          # (opendir, readdir, P_tmpdir) that do not exist in the WASM/WASI
          # sandbox. A WASM build would produce a non-functional artifact.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Library for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package Release Zip
        run: |
          cd zig-out
          zip -r ../simdb-${{ matrix.os_name }}.zip include lib || true
          cd ..

      - name: Upload Artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: simdb-${{ matrix.os_name }}.zip
